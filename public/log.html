<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Workout — DavisFit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap');

  :root {
    --black: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --gold: #c9a84c;
    --off-white: #f0ede6;
    --mid: #888;
    --ezra: #d4a017;
    --abram: #c0392b;
    --noah: #e8a0b0;
    --uriah: #e07b39;
    --amy: #9b59b6;
    --aaron: #2980b9;
    --success: #27ae60;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--off-white); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  .back-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
  }
  .back-nav a {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
  }

  header {
    padding: 2rem 1.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    max-width: 600px;
    margin: 0 auto;
  }
  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--off-white);
  }
  header h1 span { color: var(--gold); }
  header p { color: var(--mid); font-size: 0.85rem; margin-top: 0.3rem; }

  main { max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* WHO IS LOGGING */
  .member-select {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    margin-bottom: 2rem;
  }
  .member-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 4px;
    padding: 0.75rem 0.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--mid);
  }
  .member-btn:hover { border-color: var(--member-color); color: var(--member-color); }
  .member-btn.selected { border-color: var(--member-color); color: var(--member-color); background: var(--surface2); }

  /* FORM */
  .form-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .form-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
    display: block;
  }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.75rem 1rem;
    color: var(--off-white);
    font-family: 'Barlow', sans-serif;
    font-size: 0.95rem;
    margin-bottom: 1rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--gold); }
  .form-input::placeholder { color: var(--mid); }

  .sets-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.75rem;
  }

  /* EXERCISE QUICK SELECT */
  .exercise-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1rem;
  }
  .ex-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.3rem 0.75rem;
    font-size: 0.78rem;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Barlow', sans-serif;
  }
  .ex-chip:hover { border-color: var(--gold); color: var(--gold); }
  .ex-chip.selected { border-color: var(--gold); color: var(--gold); background: #1a1600; }

  /* SETS LOG */
  .sets-log { margin-bottom: 1rem; }
  .set-row {
    display: grid;
    grid-template-columns: 40px 1fr 1fr 1fr 40px;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .set-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    color: var(--gold);
    font-size: 0.9rem;
    text-align: center;
  }
  .set-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.5rem 0.75rem;
    color: var(--off-white);
    font-family: 'Barlow', sans-serif;
    font-size: 0.9rem;
    outline: none;
    text-align: center;
    width: 100%;
  }
  .set-input:focus { border-color: var(--gold); }
  .set-input::placeholder { color: #444; font-size: 0.75rem; }
  .set-delete {
    background: none;
    border: none;
    color: #444;
    cursor: pointer;
    font-size: 1rem;
    text-align: center;
    padding: 0;
  }
  .set-delete:hover { color: var(--abram); }
  .set-headers {
    display: grid;
    grid-template-columns: 40px 1fr 1fr 1fr 40px;
    gap: 0.5rem;
    margin-bottom: 0.4rem;
  }
  .set-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mid);
    text-align: center;
  }

  .add-set-btn {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 4px;
    padding: 0.6rem;
    color: var(--mid);
    cursor: pointer;
    width: 100%;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s;
    margin-bottom: 1rem;
  }
  .add-set-btn:hover { border-color: var(--gold); color: var(--gold); }

  .submit-btn {
    width: 100%;
    background: var(--gold);
    border: none;
    border-radius: 4px;
    padding: 1rem;
    color: var(--black);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 1rem;
  }
  .submit-btn:hover { background: #e0bb5a; }
  .submit-btn:disabled { background: var(--border); color: var(--mid); cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: white;
    padding: 0.75rem 1.5rem;
    border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
</style>
</head>
<body>

<div class="back-nav">
  <a href="index.html">← Back to DavisFit</a>
</div>

<header>
  <h1>Log <span>Workout</span></h1>
  <p>Track your sets, reps, and weight to build progressive overload over time.</p>
</header>

<main>

  <div class="section-title">Who's logging?</div>
  <div class="member-select">
    <button class="member-btn" style="--member-color: var(--ezra)" onclick="selectMember('Ezra', this)">Ezra</button>
    <button class="member-btn" style="--member-color: var(--abram)" onclick="selectMember('Abram', this)">Abram</button>
    <button class="member-btn" style="--member-color: var(--noah)" onclick="selectMember('Noah', this)">Noah</button>
    <button class="member-btn" style="--member-color: var(--uriah)" onclick="selectMember('Uriah', this)">Uriah</button>
    <button class="member-btn" style="--member-color: var(--amy)" onclick="selectMember('Amy', this)">Amy</button>
    <button class="member-btn" style="--member-color: var(--aaron)" onclick="selectMember('Aaron', this)">Aaron</button>
  </div>

  <div class="form-section">
    <div class="section-title">Exercise</div>
    <div class="exercise-grid" id="exerciseChips"></div>
    <label class="form-label">Or type your own</label>
    <input type="text" class="form-input" id="exerciseInput" placeholder="e.g. Goblet Squat" oninput="syncExercise(this.value)">
  </div>

  <div class="form-section">
    <div class="section-title">Sets</div>
    <div class="set-headers">
      <div class="set-header"></div>
      <div class="set-header">Reps</div>
      <div class="set-header">Weight (lbs)</div>
      <div class="set-header">Notes</div>
      <div class="set-header"></div>
    </div>
    <div class="sets-log" id="setsLog"></div>
    <button class="add-set-btn" onclick="addSet()">+ Add Set</button>

    <label class="form-label">Date</label>
    <input type="date" class="form-input" id="logDate">
  </div>

  <button class="submit-btn" onclick="submitLog()" id="submitBtn">Log Workout</button>

</main>

<div class="toast" id="toast">Workout Logged! 💪</div>

<script>
  // ---- SUPABASE INIT ----
  const SUPABASE_URL = 'https://thfkvablbyrqdndoaiqo.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_oliFMYDCKU98JHD7CxqFxg_YtjNqG03';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  let selectedMember = null;
  let setCount = 0;

  const exercises = {
    Ezra: ['DB Bench Press','DB Row','Shoulder Press','Goblet Squat','RDL','Reverse Lunge','Box Jump','Pushup','Plank','Pulldown','Step-Up','Farmer Carry'],
    Abram: ['DB Bench Press','DB Row','Shoulder Press','Goblet Squat','RDL','Reverse Lunge','Box Jump','Pushup','Plank','Pulldown','Step-Up','Farmer Carry'],
    Noah: ['Pushup','DB Row','Shoulder Press','Goblet Squat','RDL','Reverse Lunge','Glute Bridge','Plank','Pulldown','Step-Up','Farmer Carry','Side Plank'],
    default: ['Squat','Bench Press','Deadlift','Row','Shoulder Press','Pulldown','Lunge','Pushup','Plank','Farmer Carry']
  };

  // Set today's date
  document.getElementById('logDate').value = new Date().toISOString().split('T')[0];

  // Add first 3 sets by default
  addSet(); addSet(); addSet();

  function selectMember(name, btn) {
    selectedMember = name;
    document.querySelectorAll('.member-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    loadExerciseChips(name);
  }

  function loadExerciseChips(name) {
    const list = exercises[name] || exercises.default;
    const container = document.getElementById('exerciseChips');
    container.innerHTML = list.map(ex =>
      `<div class="ex-chip" onclick="selectExercise('${ex}', this)">${ex}</div>`
    ).join('');
  }

  function selectExercise(name, el) {
    document.querySelectorAll('.ex-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('exerciseInput').value = name;
  }

  function syncExercise(val) {
    document.querySelectorAll('.ex-chip').forEach(c => {
      c.classList.toggle('selected', c.textContent === val);
    });
  }

  function addSet() {
    setCount++;
    const log = document.getElementById('setsLog');
    const row = document.createElement('div');
    row.className = 'set-row';
    row.id = `set-${setCount}`;
    row.innerHTML = `
      <div class="set-num">${setCount}</div>
      <input type="number" class="set-input" placeholder="0" min="0" id="reps-${setCount}">
      <input type="number" class="set-input" placeholder="0" min="0" step="2.5" id="weight-${setCount}">
      <input type="text" class="set-input" placeholder="notes" id="notes-${setCount}">
      <button class="set-delete" onclick="removeSet(${setCount})">✕</button>
    `;
    log.appendChild(row);
  }

  function removeSet(id) {
    const row = document.getElementById(`set-${id}`);
    if (row) row.remove();
  }

  async function submitLog() {
    if (!selectedMember) { alert('Pick who is logging first.'); return; }
    const exercise = document.getElementById('exerciseInput').value.trim();
    if (!exercise) { alert('Enter an exercise.'); return; }
    const date = document.getElementById('logDate').value;

    const rows = document.querySelectorAll('.set-row');
    if (rows.length === 0) { alert('Add at least one set.'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    const logs = [];
    rows.forEach((row, i) => {
      const id = row.id.replace('set-', '');
      const reps = parseInt(document.getElementById(`reps-${id}`)?.value) || 0;
      const weight = parseFloat(document.getElementById(`weight-${id}`)?.value) || 0;
      const notes = document.getElementById(`notes-${id}`)?.value || '';
      if (reps > 0 || weight > 0) {
        logs.push({ member: selectedMember, exercise, sets: i + 1, reps, weight, notes, logged_date: date });
      }
    });

    if (logs.length === 0) { alert('Enter at least one set with reps or weight.'); btn.disabled = false; btn.textContent = 'Log Workout'; return; }

    const { error } = await db.from('workout_logs').insert(logs);
    if (error) { alert('Error saving: ' + error.message); btn.disabled = false; btn.textContent = 'Log Workout'; return; }

    showToast();
    btn.disabled = false;
    btn.textContent = 'Log Workout';
    document.getElementById('exerciseInput').value = '';
    document.querySelectorAll('.ex-chip').forEach(c => c.classList.remove('selected'));
    document.getElementById('setsLog').innerHTML = '';
    setCount = 0;
    addSet(); addSet(); addSet();
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
